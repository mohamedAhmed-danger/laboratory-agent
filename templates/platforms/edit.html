{% extends 'base.html' %}
{% block title %}تعديل المنصة{% endblock %}
{% block topbar_title %}تعديل المنصة{% endblock %}
{% block topbar_sub %}{{ platform.name }}{% endblock %}

{% block content %}

<div class="card">
  <form action="{{ url_for('edit_platform', platform_id=platform.id) }}" method="POST">
    <div class="form-grid">

      <div class="form-group full-width">
        <label>اسم المنصة</label>
        <input type="text" name="name" class="form-control" value="{{ platform.name }}" required>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-submit">حفظ التعديلات</button>
      <a href="{{ url_for('list_platforms') }}" class="btn btn-ghost">رجوع</a>
    </div>
  </form>
</div>

{% endblock %}
