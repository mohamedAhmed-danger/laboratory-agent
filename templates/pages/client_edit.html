{% extends 'base.html' %}
{% block title %}تعديل ملخص العميل{% endblock %}
{% block topbar_title %}تعديل ملخص العميل{% endblock %}
{% block topbar_sub %}Sender ID: {{ client.sender_id }}{% endblock %}

{% block content %}

<div class="card">
  <form action="{{ url_for('edit_client', platform_id=client.platform_id, page_id=client.page_id, sender_id=client.sender_id) }}" method="POST">
    <div class="form-grid">

      <div class="form-group">
        <label>Page ID</label>
        <input type="text" class="form-control" value="{{ client.page_id }}" disabled>
      </div>

      <div class="form-group">
        <label>Sender ID</label>
        <input type="text" class="form-control" value="{{ client.sender_id }}" disabled>
      </div>

      <div class="form-group full-width">
        <label>ملخص المحادثة (Summary)</label>
        <textarea name="summary" class="form-control" rows="6" style="height: auto; font-family: inherit;">{{ client.summary or '' }}</textarea>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-submit">حفظ التعديلات</button>
      <a href="{{ url_for('list_clients', platform_id=client.platform_id, page_id=client.page_id) }}" class="btn btn-ghost">رجوع</a>
    </div>
  </form>
</div>

{% endblock %}
